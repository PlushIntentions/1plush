<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Technician Dashboard</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <!-- Mapbox -->
  <link href="https://api.mapbox.com/mapbox-gl-js/v2.15.0/mapbox-gl.css" rel="stylesheet">
  <script src="https://api.mapbox.com/mapbox-gl-js/v2.15.0/mapbox-gl.js"></script>

  <!-- Styles -->
  <link rel="stylesheet" href="technician-dashboard.css">
</head>

<body>

  <!-- LOADER -->
  <div id="loader" class="loader hidden">
    <div class="spinner"></div>
    <p>Loading...</p>
  </div>

  <!-- MAIN PANEL WRAPPER -->
  <div id="main-panel" class="hidden">

    <!-- MAP PANEL -->
    <div id="map-panel" class="panel hidden">
      <h2>Job Map</h2>
      <div id="map" class="map-container"></div>
    </div>

    <!-- ACTIVE JOBS PANEL -->
    <div id="active-panel" class="panel hidden">
      <h2>Active Jobs</h2>
      <div id="active-list"></div>
    </div>

    <!-- COMPLETED JOBS PANEL -->
    <div id="completed-panel" class="panel hidden">
      <h2>Completed Jobs</h2>
      <div id="completed-list"></div>
    </div>

    <!-- UNASSIGNED JOBS PANEL -->
    <div id="unassigned-panel" class="panel hidden">
      <h2>Available Jobs</h2>
      <div id="unassigned-list"></div>
    </div>

    <!-- FILES PANEL -->
    <div id="files-panel" class="panel hidden">
      <h2>Job Files</h2>
      <div id="files-list"></div>
      <button onclick="closeFilesPanel()" class="btn">Close</button>
    </div>

    <!-- SIGNOUT PANEL -->
    <div id="signout-panel" class="panel hidden">
      <h2>Complete Job</h2>
      <p>Upload your sign-out photos:</p>

      <input type="file" id="signout-photo-1">
      <input type="file" id="signout-photo-2">

      <button onclick="submitSignOutUpload()" class="btn btn-primary">Submit</button>
      <button onclick="cancelSignOutUpload()" class="btn btn-secondary">Cancel</button>
    </div>

    <!-- ONBOARDING PANEL -->
    <div id="onboarding-panel" class="panel hidden">
      <h2>Upload Required Documents</h2>

      <label>MSA</label>
      <input type="file" id="doc-msa">

      <label>NDA</label>
      <input type="file" id="doc-nda">

      <label>W9</label>
      <input type="file" id="doc-w9">

      <label>ID</label>
      <input type="file" id="doc-id">

      <button onclick="uploadAllDocuments()" class="btn btn-primary">Submit Documents</button>
    </div>

    <!-- APPROVAL PANEL -->
    <div id="approval-panel" class="panel hidden">
      <h2>Pending Approval</h2>
      <p>Your documents have been submitted. Please wait for admin approval.</p>
    </div>

    <!-- PROFILE PANEL -->
    <div id="profile-panel" class="panel hidden">
      <h2>Your Profile</h2>
      <div id="profile-content"></div>
    </div>

  </div>

  <!-- TOAST -->
  <div id="toast" class="toast hidden"></div>

  <!-- JS -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="technician-dashboard.js"></script>

</body>
</html>
