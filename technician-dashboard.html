<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Plush Intentions Technician Dashboard</title>

<!-- Mapbox -->
<link href="https://api.mapbox.com/mapbox-gl-js/v2.15.0/mapbox-gl.css" rel="stylesheet" />

<!-- Feather Icons -->
<script src="https://unpkg.com/feather-icons"></script>

<!-- Technician Dashboard CSS -->
<link rel="stylesheet" href="tech-dashboard.css" />

</head>
<body>

<!-- LOADER -->
<div id="loader" class="loader hidden">
  <div class="spinner"></div>
</div>



<!-- MAIN DASHBOARD -->
<div id="main-panel" class="main-panel glass hidden">

  <!-- SIDEBAR -->
  <div class="sidebar glass">
    <div class="brand">Plush Intentions</div>
    <a id="nav-map" onclick="showPanel('map-panel')">Map</a>
    <a id="nav-active" onclick="showPanel('active-panel')">Active Jobs</a>
    <a id="nav-completed" onclick="showPanel('completed-panel')">Completed</a>
    <a id="nav-profile" onclick="showPanel('profile-panel')">Profile</a>
  </div>

  <!-- TOP BAR -->
  <div class="topbar glass">
    Technician Dashboard
  </div>

  <!-- MAP PANEL -->
  <div id="map-panel" class="panel">
    <div id="map"></div>
  </div>

  <!-- ACTIVE JOBS PANEL -->
  <div id="active-panel" class="panel hidden">
    <h2>Active Jobs</h2>
    <div id="active-list"></div>
  </div>

  <!-- COMPLETED JOBS PANEL -->
  <div id="completed-panel" class="panel hidden">
    <h2>Completed Jobs</h2>
    <div id="completed-list"></div>
  </div>

  <!-- PROFILE PANEL -->
  <div id="profile-panel" class="panel hidden">
    <h2>Your Profile</h2>
    <div id="profile-content"></div>
  </div>

  <!-- ONBOARDING PANEL -->
  <div id="onboarding-panel" class="panel hidden">
    <div class="login-card glass" style="max-width:420px;margin:40px auto;">
      <img src="logo.png" />
      <h2>Complete Your Onboarding</h2>

      <label>MSA</label>
      <input type="file" id="doc-msa" />

      <label>NDA</label>
      <input type="file" id="doc-nda" />

      <label>W‑9</label>
      <input type="file" id="doc-w9" />

      <label>Government ID</label>
      <input type="file" id="doc-id" />

      <button class="btn-brand" onclick="uploadAllDocuments()">Submit Documents</button>
    </div>
  </div>

  <!-- APPROVAL PANEL -->
  <div id="approval-panel" class="panel hidden">
    <div class="login-card glass" style="max-width:420px;margin:40px auto;">
      <img src="logo.png" />
      <h2>Documents Submitted</h2>
      <p>Your documents are under review.</p>
    </div>
  </div>

  <!-- SIGN-OUT SHEET PANEL -->
  <div id="signout-panel" class="panel hidden">
    <div style="display:flex;justify-content:flex-end;">
      <button class="close-btn" onclick="cancelSignOutUpload()">✕</button>
    </div>

    <h2>Complete Work Order</h2>

    <label>Sign‑Out Sheet</label>
    <input type="file" id="signout-file" />

    <label>Manager on Duty Name</label>
    <input type="text" id="manager-name" />

    <label>Technician Performance</label>
    <select id="tech-rating">
      <option value="">Select</option>
      <option value="5">⭐⭐⭐⭐⭐ Excellent</option>
      <option value="4">⭐⭐⭐⭐ Good</option>
      <option value="3">⭐⭐⭐ Average</option>
      <option value="2">⭐⭐ Poor</option>
      <option value="1">⭐ Very Poor</option>
    </select>

    <label>Satisfied?</label>
    <select id="satisfied">
      <option value="">Select</option>
      <option value="yes">Yes</option>
      <option value="no">No</option>
    </select>

    <label>System Working?</label>
    <select id="system-working">
      <option value="">Select</option>
      <option value="yes">Yes</option>
      <option value="no">No</option>
    </select>

    <label>Notes</label>
    <textarea id="completion-notes"></textarea>

    <button class="btn-brand" onclick="submitSignOutSheet()">Submit Completion</button>
  </div>

  <!-- FILES PANEL -->
  <div id="files-panel" class="panel hidden">
    <div style="display:flex;justify-content:flex-end;">
      <button class="close-btn" onclick="closeFilesPanel()">✕</button>
    </div>

    <h2>Work Order Files</h2>
    <div id="files-list"></div>
  </div>

</div>

<!-- TOAST -->
<div id="toast"></div>

<!-- Mapbox -->
<script src="https://api.mapbox.com/mapbox-gl-js/v2.15.0/mapbox-gl.js"></script>

<!-- Supabase -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<!-- Technician Dashboard JS -->
<script src="tech-dashboard.js"></script>

<!-- Feather Icons Init -->
<script>
  feather.replace();
</script>

</body>
</html>
