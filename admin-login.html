<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Plush Intentions – Admin Login</title>

<!-- ICONS -->
<script src="https://unpkg.com/feather-icons"></script>

<!-- SUPABASE -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
/* ── BRAND ───────────────────────────────────────────── */
:root { --brand: #FF4F9F; }

/* ── RESET ───────────────────────────────────────────── */
*, *::before, *::after {
  margin: 0; padding: 0;
  box-sizing: border-box;
  font-family: Inter, sans-serif;
}

/* ── BACKGROUND ──────────────────────────────────────── */
body {
  min-height: 100vh;
  background: url('background.png') center/cover no-repeat fixed;
  color: #fff;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
}
body::before {
  content: "";
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.50);
  backdrop-filter: blur(3px);
  z-index: -1;
}

/* ── GLASS ───────────────────────────────────────────── */
.glass {
  background: rgba(255,255,255,0.06);
  backdrop-filter: blur(28px);
  border: 1px solid rgba(255,255,255,0.14);
  border-radius: 24px;
  box-shadow: 0 8px 40px rgba(0,0,0,0.3);
}

/* ── LOADER ──────────────────────────────────────────── */
#loader {
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.6);
  backdrop-filter: blur(14px);
  display: flex; align-items: center; justify-content: center;
  z-index: 9999;
  transition: opacity .4s;
}
.loader-logo {
  width: 150px;
  filter: drop-shadow(0 0 10px var(--brand)) drop-shadow(0 0 24px var(--brand));
  animation: pulse 1.2s infinite ease-in-out;
}
@keyframes pulse {
  0%,100% { transform: scale(1); opacity: .85; }
  50%      { transform: scale(1.08); opacity: 1; }
}

/* ── CARD ────────────────────────────────────────────── */
.card {
  width: 100%;
  max-width: 400px;
  padding: 48px 42px;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 0;
  position: relative;
  z-index: 10;
}

/* ── LOGO ────────────────────────────────────────────── */
.logo-wrap {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 12px;
  margin-bottom: 10px;
}
.logo-wrap img {
  width: 110px;
  filter:
    drop-shadow(0 0 10px var(--brand))
    drop-shadow(0 0 22px var(--brand))
    drop-shadow(0 0 40px var(--brand));
  animation: glowPulse 3s ease-in-out infinite;
}
@keyframes glowPulse {
  0%,100% { filter: drop-shadow(0 0 10px var(--brand)) drop-shadow(0 0 22px var(--brand)); }
  50%     { filter: drop-shadow(0 0 14px var(--brand)) drop-shadow(0 0 30px var(--brand)) drop-shadow(0 0 50px var(--brand)); }
}
.logo-wrap h1 {
  font-size: 22px;
  font-weight: 700;
  text-align: center;
  text-shadow: 0 0 8px var(--brand), 0 0 18px var(--brand);
  letter-spacing: -.02em;
}
.logo-wrap p {
  font-size: 13px;
  opacity: .6;
  text-align: center;
  margin-bottom: 8px;
}

/* ── DIVIDER ─────────────────────────────────────────── */
.divider {
  width: 100%;
  height: 1px;
  background: linear-gradient(90deg, transparent, rgba(255,79,159,0.4), transparent);
  margin: 20px 0 28px;
}

/* ── FIELD ───────────────────────────────────────────── */
.field {
  width: 100%;
  display: flex;
  flex-direction: column;
  gap: 7px;
  margin-bottom: 16px;
}
.field label {
  font-size: 12px;
  font-weight: 600;
  opacity: .7;
  letter-spacing: .05em;
  text-transform: uppercase;
}
.input-wrap {
  position: relative;
  width: 100%;
}
.input-wrap i {
  position: absolute;
  left: 14px; top: 50%;
  transform: translateY(-50%);
  width: 16px; height: 16px;
  opacity: .45;
  pointer-events: none;
}
.input-wrap input {
  width: 100%;
  padding: 13px 14px 13px 40px;
  background: rgba(255,255,255,0.08);
  border: 1px solid rgba(255,255,255,0.15);
  border-radius: 12px;
  color: #fff;
  font-size: 14px;
  outline: none;
  transition: border .2s, box-shadow .2s, background .2s;
}
.input-wrap input::placeholder { color: rgba(255,255,255,0.28); }
.input-wrap input:focus {
  border-color: var(--brand);
  background: rgba(255,79,159,0.07);
  box-shadow: 0 0 0 3px rgba(255,79,159,0.15);
}

/* Password toggle */
.toggle-pass {
  position: absolute;
  right: 14px; top: 50%;
  transform: translateY(-50%);
  background: none; border: none;
  color: rgba(255,255,255,0.4);
  cursor: pointer; padding: 0;
  display: flex; align-items: center;
  transition: color .2s;
}
.toggle-pass:hover { color: rgba(255,255,255,0.8); }
.toggle-pass i { width: 16px; height: 16px; }

/* ── FORGOT LINK ─────────────────────────────────────── */
.forgot {
  width: 100%;
  text-align: right;
  margin-top: -8px;
  margin-bottom: 10px;
}
.forgot a {
  font-size: 12px;
  color: var(--brand);
  text-decoration: none;
  opacity: .8;
  transition: opacity .2s;
}
.forgot a:hover { opacity: 1; }

/* ── ALERT ───────────────────────────────────────────── */
.alert {
  width: 100%;
  padding: 12px 16px;
  border-radius: 10px;
  font-size: 13px;
  margin-bottom: 14px;
  display: none;
  line-height: 1.5;
}
.alert-error {
  background: rgba(239,68,68,0.15);
  border: 1px solid rgba(239,68,68,0.35);
  color: #fca5a5;
}
.alert-success {
  background: rgba(74,222,128,0.12);
  border: 1px solid rgba(74,222,128,0.35);
  color: #86efac;
}

/* ── BUTTON ──────────────────────────────────────────── */
.btn-brand {
  width: 100%;
  padding: 14px;
  background: var(--brand);
  border: none;
  border-radius: 12px;
  color: #fff;
  font-size: 15px;
  font-weight: 700;
  cursor: pointer;
  transition: opacity .2s, transform .15s;
  box-shadow: 0 0 20px rgba(255,79,159,0.45);
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  margin-top: 6px;
}
.btn-brand:hover   { opacity: .88; }
.btn-brand:active  { transform: scale(.98); }
.btn-brand:disabled { opacity: .55; cursor: not-allowed; }

/* ── FORGOT PASSWORD PANEL ───────────────────────────── */
#forgot-panel {
  display: none;
  width: 100%;
  text-align: center;
}
#forgot-panel p {
  font-size: 13px;
  opacity: .65;
  line-height: 1.6;
  margin-bottom: 16px;
}
.btn-ghost {
  width: 100%;
  padding: 13px;
  background: rgba(255,255,255,0.07);
  border: 1px solid rgba(255,255,255,0.15);
  border-radius: 12px;
  color: #fff;
  font-size: 14px;
  cursor: pointer;
  transition: background .2s;
  margin-top: 10px;
}
.btn-ghost:hover { background: rgba(255,255,255,0.12); }

/* ── ADMIN BADGE ─────────────────────────────────────── */
.admin-badge {
  display: flex;
  align-items: center;
  gap: 7px;
  padding: 6px 14px;
  background: rgba(255,79,159,0.1);
  border: 1px solid rgba(255,79,159,0.25);
  border-radius: 20px;
  font-size: 12px;
  font-weight: 600;
  color: var(--brand);
  margin-bottom: 20px;
  letter-spacing: .04em;
}
.admin-badge i { width: 13px; height: 13px; }

/* ── BOTTOM LINK ─────────────────────────────────────── */
.bottom-link {
  margin-top: 22px;
  font-size: 12px;
  opacity: .5;
  text-align: center;
}
.bottom-link a {
  color: var(--brand);
  text-decoration: none;
}
.bottom-link a:hover { text-decoration: underline; }

/* ── PARTICLES (decorative) ──────────────────────────── */
.particles {
  position: fixed; inset: 0;
  pointer-events: none;
  z-index: 0;
  overflow: hidden;
}
.particle {
  position: absolute;
  width: 3px; height: 3px;
  background: var(--brand);
  border-radius: 50%;
  opacity: 0;
  animation: float linear infinite;
}
@keyframes float {
  0%   { transform: translateY(100vh) scale(0); opacity: 0; }
  10%  { opacity: .6; }
  90%  { opacity: .2; }
  100% { transform: translateY(-10vh) scale(1); opacity: 0; }
}
</style>
</head>
<body>

<!-- LOADER -->
<div id="loader">
  <img src="logo.png" class="loader-logo" alt="Plush Intentions" />
</div>

<!-- PARTICLES -->
<div class="particles" id="particles"></div>

<!-- LOGIN CARD -->
<div class="card glass">

  <div class="logo-wrap">
    <img src="logo.png" alt="Plush Intentions" />
    <h1>Plush Intentions</h1>
    <p>Admin Command Center</p>
  </div>

  <span class="admin-badge">
    <i data-feather="shield"></i>
    ADMINISTRATOR ACCESS
  </span>

  <div class="divider"></div>

  <!-- ALERTS -->
  <div class="alert alert-error"   id="alert-error"></div>
  <div class="alert alert-success" id="alert-success"></div>

  <!-- LOGIN FORM -->
  <div id="login-panel" style="width:100%">
    <div class="field">
      <label>Email Address</label>
      <div class="input-wrap">
        <i data-feather="mail"></i>
        <input type="email" id="email" placeholder="admin@plushintentions.com"
               autocomplete="email" />
      </div>
    </div>

    <div class="field">
      <label>Password</label>
      <div class="input-wrap">
        <i data-feather="lock"></i>
        <input type="password" id="password" placeholder="••••••••"
               autocomplete="current-password" />
        <button class="toggle-pass" type="button" onclick="togglePassword()" id="toggle-btn">
          <i data-feather="eye" id="eye-icon"></i>
        </button>
      </div>
    </div>

    <div class="forgot">
      <a href="#" onclick="showForgot(); return false;">Forgot password?</a>
    </div>

    <button class="btn-brand" id="login-btn" onclick="doLogin()">
      <i data-feather="log-in"></i>
      Sign In to Dashboard
    </button>
  </div>

  <!-- FORGOT PASSWORD FORM -->
  <div id="forgot-panel">
    <p>Enter your admin email and we'll send you a password reset link.</p>
    <div class="field">
      <label>Email Address</label>
      <div class="input-wrap">
        <i data-feather="mail"></i>
        <input type="email" id="reset-email" placeholder="admin@plushintentions.com" />
      </div>
    </div>
    <button class="btn-brand" onclick="doReset()">
      <i data-feather="send"></i>
      Send Reset Link
    </button>
    <button class="btn-ghost" onclick="showLogin()">← Back to Sign In</button>
  </div>

  <div class="bottom-link">
    Technician? <a href="technician-portal.html">Sign in here →</a>
  </div>

</div><!-- /card -->

<script>
/* ─────────────────────────────────────────
   CONSTANTS
───────────────────────────────────────── */
const SUPABASE_URL = "https://gsneugdwoxpibajghwge.supabase.co";
const SUPABASE_KEY = "sb_publishable_bbsF43-TXGgEumRGflGf5A_apC1dP3T";

let sb;

/* ─────────────────────────────────────────
   INIT
───────────────────────────────────────── */
window.addEventListener("load", async () => {
  sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
  feather.replace();
  spawnParticles();

  // Hide loader
  setTimeout(() => {
    const loader = document.getElementById("loader");
    loader.style.opacity = "0";
    setTimeout(() => loader.style.display = "none", 400);
  }, 1400);

  // If already logged in → redirect to dashboard
  const { data: { session } } = await sb.auth.getSession();
  if (session) {
    // Verify they are actually an admin
    const { data: adminRow } = await sb
      .from("admin_users")
      .select("id")
      .eq("user_id", session.user.id)
      .single();

    if (adminRow) {
      window.location.href = "admin-dashboard.html";
    } else {
      await sb.auth.signOut();
    }
  }
});

/* ─────────────────────────────────────────
   LOGIN
───────────────────────────────────────── */
async function doLogin() {
  const email = document.getElementById("email").value.trim();
  const pass  = document.getElementById("password").value;
  const btn   = document.getElementById("login-btn");

  hideAlerts();

  if (!email || !pass) {
    return showError("Please enter your email and password.");
  }

  // Disable button during request
  btn.disabled = true;
  btn.innerHTML = `<i data-feather="loader"></i> Signing in…`;
  feather.replace();

  const { data, error } = await sb.auth.signInWithPassword({ email, password: pass });

  if (error) {
    btn.disabled = false;
    btn.innerHTML = `<i data-feather="log-in"></i> Sign In to Dashboard`;
    feather.replace();
    return showError("Invalid email or password. Please try again.");
  }

  // Check admin_users table
  const { data: adminRow, error: adminErr } = await sb
    .from("admin_users")
    .select("id")
    .eq("user_id", data.user.id)
    .single();

  if (adminErr || !adminRow) {
    await sb.auth.signOut();
    btn.disabled = false;
    btn.innerHTML = `<i data-feather="log-in"></i> Sign In to Dashboard`;
    feather.replace();
    return showError("Access denied. This account does not have admin privileges.");
  }

  // Success → redirect
  showSuccess("Welcome back! Redirecting to dashboard…");
  setTimeout(() => { window.location.href = "admin-dashboard.html"; }, 1000);
}

/* ─────────────────────────────────────────
   FORGOT PASSWORD
───────────────────────────────────────── */
async function doReset() {
  const email = document.getElementById("reset-email").value.trim();
  hideAlerts();

  if (!email) return showError("Please enter your email address.");

  const redirectTo = window.location.origin + "/admin-login.html";

  const { error } = await sb.auth.resetPasswordForEmail(email, { redirectTo });

  if (error) return showError("Could not send reset email. Please try again.");

  showSuccess("Reset link sent! Check your inbox.");
  setTimeout(showLogin, 3000);
}

/* ─────────────────────────────────────────
   PANEL SWITCHING
───────────────────────────────────────── */
function showForgot() {
  document.getElementById("login-panel").style.display  = "none";
  document.getElementById("forgot-panel").style.display = "block";
  hideAlerts();
}
function showLogin() {
  document.getElementById("forgot-panel").style.display = "none";
  document.getElementById("login-panel").style.display  = "block";
  hideAlerts();
}

/* ─────────────────────────────────────────
   PASSWORD TOGGLE
───────────────────────────────────────── */
function togglePassword() {
  const input = document.getElementById("password");
  const icon  = document.getElementById("eye-icon");
  if (input.type === "password") {
    input.type = "text";
    icon.setAttribute("data-feather", "eye-off");
  } else {
    input.type = "password";
    icon.setAttribute("data-feather", "eye");
  }
  feather.replace();
}

/* ─────────────────────────────────────────
   ALERTS
───────────────────────────────────────── */
function showError(msg) {
  const el = document.getElementById("alert-error");
  el.textContent = msg;
  el.style.display = "block";
}
function showSuccess(msg) {
  const el = document.getElementById("alert-success");
  el.textContent = msg;
  el.style.display = "block";
}
function hideAlerts() {
  document.getElementById("alert-error").style.display   = "none";
  document.getElementById("alert-success").style.display = "none";
}

/* ─────────────────────────────────────────
   ENTER KEY
───────────────────────────────────────── */
document.addEventListener("keydown", e => {
  if (e.key === "Enter") {
    if (document.getElementById("login-panel").style.display !== "none") {
      doLogin();
    } else {
      doReset();
    }
  }
});

/* ─────────────────────────────────────────
   FLOATING PARTICLES (decorative)
───────────────────────────────────────── */
function spawnParticles() {
  const container = document.getElementById("particles");
  for (let i = 0; i < 18; i++) {
    const p = document.createElement("div");
    p.className = "particle";
    p.style.left     = `${Math.random() * 100}%`;
    p.style.width    = `${Math.random() * 3 + 1}px`;
    p.style.height   = p.style.width;
    p.style.animationDuration  = `${Math.random() * 12 + 8}s`;
    p.style.animationDelay     = `${Math.random() * 8}s`;
    p.style.opacity  = `${Math.random() * 0.5}`;
    container.appendChild(p);
  }
}
</script>
</body>
</html>
